name: Python application

on:
  push:
    branches: [ "main", "develop" ]

env:
  # Variavel global apontando para o seu usuário correto no Docker Hub
  IMAGE_NAME: rafaelribeirogon/senai_api_ta

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Testando o Codigo
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Executar o pytest no projeto
      run: |
        PYTHONPATH=. pytest tests/ -v --tb=short
  
  Imagem:
    name: Construindo Imagem para Docker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Docker Login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{secrets.DOCKER_USER}}
          password: ${{secrets.DOCKER_PWD}}
        
      - name: Configurar o Docker na VM
        uses: docker/build-push-action@v7.1.0
        with:
          push: true
          tags: |
              ${{ env.IMAGE_NAME }}:latest
              ${{ env.IMAGE_NAME }}:${{github.sha}}
          
  deploy_homol:
    name: Implantando em Homologacao
    runs-on: ubuntu-latest
    needs: Imagem
    # Deploy automático ao merge em develop
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Deploy na EC2 (Homolog) via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_KEY}}
          script: |
            echo "Acesso liberado (Homologacao)"
            sudo docker pull ${{ env.IMAGE_NAME }}:latest
            sudo docker stop senai_api_ta_homol 2>/dev/null || true
            sudo docker rm senai_api_ta_homol 2>/dev/null || true
            # Sobe na porta 8080 conforme exigido no roteiro
            sudo docker run --name senai_api_ta_homol -d -p 8080:8080 ${{ env.IMAGE_NAME }}:latest
            sleep 5 
            curl -f http://localhost:8080/health || exit 1
            echo "Deploy HOMOL feito com sucesso"

  Deploy_Producao:
    name: Implantando na EC2 (Producao)
    runs-on: ubuntu-latest
    needs: Imagem
    # Garante que produção só é ativada em push para a branch main
    if: github.ref == 'refs/heads/main'
    # Forca a aprovacao manual usando o nome exato do seu ambiente
    environment: Produção
    steps:
      - name: Deploy na EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          # Usa os secrets de producao especificos exigidos no roteiro
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USERNAME}}
          key: ${{secrets.EC2_SSH_KEY}}
          script: |
            echo "Acesso liberado (Producao)"
            sudo docker pull ${{ env.IMAGE_NAME }}:latest
            sudo docker stop senai_api_ta 2>/dev/null || true
            sudo docker rm senai_api_ta 2>/dev/null || true
            sudo docker run --name senai_api_ta -d -p 80:8080 ${{ env.IMAGE_NAME }}:latest
            sleep 5 
            curl -f http://localhost/health || exit 1
            echo "Deploy PRD feito com sucesso"
